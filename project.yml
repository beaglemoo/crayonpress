name: ColourMe
options:
  bundleIdPrefix: com.beaglemoo
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: D6VHKTRR33
    CODE_SIGN_STYLE: Automatic
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_HARDENED_RUNTIME: YES
targets:
  ColourMe:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: ColourMe
        excludes:
          - "Info.plist"
          - "ColourMe.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beaglemoo.ColourMe
        PRODUCT_NAME: ColourMe
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: ColourMe/Info.plist
      properties:
        CFBundleDisplayName: ColourMe
        LSApplicationCategoryType: public.app-category.education
        NSHumanReadableCopyright: "Copyright 2026 beaglemoo"
        LSMinimumSystemVersion: "26.0"
    entitlements:
      path: ColourMe/ColourMe.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
schemes:
  ColourMe:
    build:
      targets:
        ColourMe: all
    run:
      config: Debug
    archive:
      config: Release
