name: CrayonPress
options:
  bundleIdPrefix: com.beaglemoo
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: D6VHKTRR33
    CODE_SIGN_STYLE: Automatic
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_HARDENED_RUNTIME: YES
targets:
  CrayonPress:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: CrayonPress
        excludes:
          - "Info.plist"
          - "CrayonPress.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beaglemoo.CrayonPress
        PRODUCT_NAME: CrayonPress
        MARKETING_VERSION: "1.3.2"
        CURRENT_PROJECT_VERSION: "6"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: CrayonPress/Info.plist
      properties:
        CFBundleDisplayName: CrayonPress
        LSApplicationCategoryType: public.app-category.education
        NSHumanReadableCopyright: "Copyright 2026 beaglemoo"
        LSMinimumSystemVersion: "26.0"
    entitlements:
      path: CrayonPress/CrayonPress.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
schemes:
  CrayonPress:
    build:
      targets:
        CrayonPress: all
    run:
      config: Debug
    archive:
      config: Release
